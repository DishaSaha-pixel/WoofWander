    <style>
      body {
        margin: 0;

      .center {

      .book {

      .pages {
        width: 100%;

        position: relative;
      }
      .page {
        width: 580px;
        height: 370px;
        position: absolute;
        top: 0;
        left: 0;
        border-radius: 7mm;
        margin: 0 6px;
        transform-style: preserve-3d;
        transform-origin: left;
        transition: 0.25s;
        box-shadow: 1px 2px 0 0 rgba(0, 0, 0, 0.15),
          1px 3px 1px 0 rgba(0, 0, 0, 0.1);

      .home-button {

    }

            width: 100px;
            height: 100px;
        }
        
.level-btn img {
  width: 50px;
            height: 50px;
}

      .page-side {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 20px 30px;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        flex-direction: column;
        font-family: poppins;
        border-radius: 7mm;
        position: absolute;
        top: 0;
        left: 0;
        backface-visibility: hidden;
      }
      
      .page-content {
        flex-grow: 1;
        font-size: 25px;
        display: flex;
        align-items: center;
      }
      .page-footer {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 15px;
        font-size: 14px;
      }
      .pg-no {
        width: 14px;
        padding: 0 15px;
        height: 20px;
        line-height: 20px;
        text-align: center;
        color: rgb(40, 40, 40);
        background: white;
        border-radius: 3mm;
      }
      .front {
        background: rgb(252, 214, 88);
        color: rgb(40, 40, 40);
        padding-left: 40px;
        
      }
      .back {
        background: rgb(40, 40, 40);
        color: white;
        padding-right: 40px;
        transform: rotateY(180deg);
      }
      .beads {
        position: absolute;
        top: 0;
        left: -12px;
        height: 370px;
        display: flex;
        align-items: center;
        justify-content: space-evenly;
        flex-direction: column;
        z-index: 9999;
      }
      .bead {
        width: 36px;
        height: 12px;
        background: white;
        border-radius: 5mm;
        z-index: 9999;
        box-shadow: inset 1px 2px 0 0 rgba(0, 0, 0, 0.15),
          inset 1px 3px 1px 0 rgba(0, 0, 0, 0.1);
      }

      .controls {
  width: 100%;
  position: absolute;
  bottom: 120px; /* Adjusted to place the buttons below the book */
  left: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  pointer-events: none; /* Ensure that the buttons are clickable */
}

.controls button {
  background: rgb(241, 238, 238);
  width: 40px;
  height: 40px;
  border: 0.4mm solid rgb(11, 11, 11);
  border-radius: 50%;
  outline: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  pointer-events: all; /* Ensure that the buttons are clickable */
}

.controls .btn:first-of-type {
  margin-left: 600px; /* Move the arrow back button to the right */
}

.controls .btn:last-of-type {
  margin-right: 320px; /* Move the arrow forward button to the left */
}
.bottom-button {
    position: absolute;
    bottom: 0px;
    right: 5px; /* Position the button to the bottom-right corner */
}

.bottom-button img {
    width: 150px;
    height: 80px;
}

          <span class="material-icons-outlined">arrow_forward</span>
        </button>

    <script>
      function setIndex() {
        let pages = document.querySelectorAll(".page");
        for (var i = 0; i < pages.length; i++) {
          pages[i].style.zIndex = pages.length - i;
        }
      }

      setIndex();

      function previous() {
          let active = document.querySelector(".active");
          let prevSib = active.previousElementSibling;
          if (prevSib && prevSib.className === "page") {
            active.className = "page";
            prevSib.className = "page active";
            setIndex();
            prevSib.style.transform = "rotateY(0deg)";
            let prevSib2 = prevSib.previousElementSibling;
            if (prevSib2 && prevSib2.className == "page") {
              prevSib2.style.zIndex = "9998";
            }
          }
        }

      function next() {
          let active = document.querySelector(".active");
          let nextSib = active.nextElementSibling;
          if (nextSib) {
            active.style.transform = "rotateY(180deg)";
            active.className = "page";
            setIndex();
            active.style.zIndex = "9998";
            nextSib.className = "page active";
          }
        }
      document.getElementById('level-btn').addEventListener('click', function() {
        window.location.href = 'level_3.html'; 
      });
    </script>
     <a href="level_3.html" class="bottom-button">
